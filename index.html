<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virso</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 0.2em;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 2em;
        }

        .button-container {
            display: flex;
            gap: 20px;
            margin-bottom: 1.5em;
        }

        a.button-link {
            text-decoration: none;
        }

        button {
            background-color: #00bcd4;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0097a7;
        }

        .login-text a {
            color: #00bcd4;
            text-decoration: underline;
        }

        .login-text a:hover {
            color: #0097a7;
        }
    </style>
</head>
<body>
    <h1>Welcome to Virso</h1>
    <p>Join us today and explore the future of the web.</p>

    <div class="button-container">
        <a href="signup.html" class="button-link">
            <button type="button">Sign Up</button>
        </a>
    </div>

    <p class="login-text">Already have an account? <a href="login.html">Log In</a></p>
</body>
</html>
